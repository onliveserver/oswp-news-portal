<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Shield/Square with rounded corners -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#grad)" />
  <!-- Glowing Overlay Grid -->
  <path d="M 8,36 H 120 M 8,64 H 120 M 8,92 H 120 M 36,8 V 120 M 64,8 V 120 M 92,8 V 120" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.1" />
  <!-- Stylized Newspaper Fold Icon in center -->
  <g transform="translate(32, 32)">
    <!-- Base paper -->
    <path d="M4,12 H60 V56 H4 Z" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Header/Logo area -->
    <path d="M12,22 H32 M12,30 H52 M12,38 H52 M12,46 H36" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    <!-- Small image mock -->
    <rect x="40" y="20" width="12" height="12" rx="2" fill="#ffffff" fill-opacity="0.3" stroke="#ffffff" stroke-width="2" />
  </g>
  <!-- Small glowing node at the corner -->
  <circle cx="96" cy="32" r="6" fill="#38bdf8" filter="url(#glow)" />
</svg>
